<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duelo LP">
<meta name="theme-color" content="#206865">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<title>Duelo App</title>

<style>
/* --- TRAVA DE SELEÇÃO E GERAL --- */
* { 
    font-family: 'Orbitron', sans-serif !important; 
    -webkit-user-select: none; /* iOS Safari */
    -moz-user-select: none; /* Firefox */
    -ms-user-select: none; /* Internet Explorer/Edge */
    user-select: none; /* Non-prefixed version, currently supported by Chrome and Opera */
    -webkit-touch-callout: none; /* Impede menu ao segurar no iOS */
}

html, body { width: 100%; height: 100vh; overflow: hidden; margin: 0; padding: 0; touch-action: manipulation; }

body {
    background: radial-gradient(#222,#000);
    background-image: url("fundo2.png");
    background-size: cover;
    background-position: center;
    color: white;
}

#overlay-inicio {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    display: flex; justify-content: center; align-items: center;
    z-index: 10000; transition: opacity 0.8s ease;
}

#btn-comecar {
    padding: 20px 40px; font-size: 24px; font-weight: bold;
    color: white; background: #d32f2f; border: none;
    border-radius: 8px; cursor: pointer;
    box-shadow: 0 0 20px rgba(211, 47, 47, 0.5);
}

.fade-out { opacity: 0; pointer-events: none; }

.container { display: flex; flex-direction: row; height: 100vh; padding: 0; gap: 0; box-sizing: border-box; }

/* --- SIDEBAR --- */
.sidebar {
    display: flex; flex-direction: column; gap: 6px;
    width: 110px; justify-content: center; padding: 10px;
}

.btn-group-dice { display: none; flex-direction: column; gap: 5px; }

button {
    padding: 9px; font-size: 13px; border-radius: 8px; border: none;
    background: #444; color: white; cursor: pointer;
    width: 100%; transition: transform 0.1s ease, filter 0.1s ease;
    display: flex; align-items: center; justify-content: center;
}

button:active { transform: scale(0.95); filter: brightness(1.3); }

/* --- D20 E CORES --- */
.btn-moeda { background: #ffc107; color: #333; font-weight: bold; font-size:12px;}
.btn-dados-toggle { background: #e73725eb; font-weight: bold; font-size:12px;}
.btn-lp-init { background: #007cc7; color: #fff; font-weight: bold; font-size:12px;}

.fundo-animado-d20 {
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientAnim 5s ease infinite;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    color: white !important;
}

@keyframes gradientAnim {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.btn-d20 {
    font-weight: bold; font-size: 16px !important;
    border: 1px solid rgba(255, 255, 255, 0.4) !important;
    animation: gradientAnim 5s ease infinite, pulseGlow 2s infinite;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 5px rgba(35, 213, 171, 0.4); }
    50% { box-shadow: 0 0 20px rgba(231, 60, 126, 0.8); }
}

.resultado-d20-especial {
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    width: 150px; height: 150px; display: flex; align-items: center;
    justify-content: center; font-size: 60px; font-weight: bold;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
}

.btn-d12108 { background: #ff3d00c2; font-weight: bold; font-size:12px}
.btn-d6 { background: #e73725eb; font-weight: bold; font-size:12px}
#btn-fullscreen-toggle { background: #6895ba; color: black; font-weight: bold; font-size:12px; }

.btn-menos { color: #ff4444 !important; font-weight: bold; }
.btn-mais { color: #2cd2a8 !important; font-weight: bold; }
.selecionado { outline: 2px solid #43d6b1 !important; outline-offset: -3px; }

/* --- AREA PRINCIPAL --- */
.main-content {
    flex-grow: 1; display: flex; justify-content: center;
    align-items: center; background: rgba(0, 0, 0, 0.3);
}

.area { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; width: 100%; }

.dado { width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 50px; background: #fff; color: #000; border-radius: 12px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-bottom: 5px solid #ccc;}
.dado-d20 { clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }

.moeda { width: 160px; height: 160px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 21px; background: linear-gradient(145deg, #ffd700, #ff8c00); color: #3e2723; font-weight: bold; border: 4px solid #fff176; text-align: center; cursor: pointer; }
.girar { animation: giro 0.5s infinite linear; }
@keyframes giro { from {transform:rotateY(0deg);} to {transform:rotateY(360deg);} }

.lp-container { display: flex; justify-content: space-around; gap: 10px; width: 100%; height: 100%; }
.lp-player { flex: 1; background: rgba(0, 0, 0, 0.5); padding: 5px; border-radius: 10px; border: 1px solid #007cc7; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
.lp-valor { font-size: 2.5rem; font-weight: bold; color: #2cd2a8; }
.lp-teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; width: 100%; }
.lp-teclado button { height: 50px; font-size: 14px; background: #333; }
.lp-controles { display: flex; gap: 5px; width: 100%; margin-top:4px; }
.lp-controles button { font-size: 14px; flex: 1; height: 45px; background: #333; }
.btn-ROLAR-grande { background: #e73725eb !important; font-weight: bold; font-size: 24px; width: 200px; height: 80px; border-radius: 20px; }
.hidden { display: none !important; }
.btn-icon { width: 20px; height: 20px; vertical-align: middle; margin-right: 5px; pointer-events: none; }
</style>
</head>

<body oncontextmenu="return false;"> <div id="overlay-inicio">
    <button id="btn-comecar">INICIAR APP</button>
</div>

<audio id="som-inicio" src="duelo.mp3" preload="auto"></audio>

<div class="container">
    <div class="sidebar">
        <div id="controles-padrao">
            <div style="text-align:center; margin-bottom:10px;">
                <img src="pngneuron.png" style="width:100px; filter: drop-shadow(0 0 5px #00ffcc);">
            </div>
            <button class="btn-moeda" onclick="prepararMoeda(this)" style="margin-bottom: 6px;">1ST / 2ND</button>
            <button id="btn-dados-main" class="btn-dados-toggle" onclick="toggleModoDados(this)" style="margin-bottom: 6px;">
                <img src="dados_icon.png" class="btn-icon"> DADOS 
            </button>
            <button id="btn-8000" class="btn-lp-init" onclick="iniciarLP(8000, this)" style="margin-bottom: 6px;">8000 LP</button>
            <button id="btn-4000" class="btn-lp-init" onclick="iniciarLP(4000, this)" style="margin-bottom: 6px;">4000 LP</button>
            <button id="btn-fullscreen-toggle"> <img src="gear_icon.png" class="btn-icon"> </button>
        </div>

        <div id="controles-dados" class="btn-group-dice">
            <button id="btn-d20" class="btn-d20 fundo-animado-d20" onclick="selecionarAcao('d20', this)">⬡&nbsp;20</button>
            <button class="btn-d12108" onclick="selecionarAcao('d12', this)"><i>⬡</i>&nbsp;12</button>
            <button class="btn-d12108" onclick="selecionarAcao('d10', this)"><i>⬡</i>&nbsp;10</button>
            <button class="btn-d12108" onclick="selecionarAcao('d8', this)"><i>⬡</i>&nbsp;8</button>
            <button class="btn-d6" onclick="selecionarAcao('d6-1', this)"><img src="dados_icon.png" class="btn-icon">&nbsp;6</button>
            <button class="btn-d6" onclick="selecionarAcao('d6-2', this)"><img src="dados_icon.png" class="btn-icon">&nbsp;x2</button>
            <button class="btn-d6" onclick="selecionarAcao('d6-3', this)"><img src="dados_icon.png" class="btn-icon">&nbsp;x3</button>
            <button onclick="voltarLP()" style="background:#666; margin-top:10px; font-size:10px">VOLTAR</button>
        </div>
    </div>

    <div class="main-content">
        <div class="area" id="area"></div>
    </div>
</div>

<script>
let lp1=0, lp2=0, inputLP={1:'',2:''}, lpInicial={1:8000,2:8000}, acaoSelecionada=null, modoDados=false;

document.getElementById('btn-comecar').addEventListener('click', async () => {
    const som = document.getElementById('som-inicio');
    if (som) som.play().catch(()=>{});
    try {
        const doc = document.documentElement;
        if (doc.requestFullscreen) await doc.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(()=>{});
    } catch (e) {}
    document.getElementById('overlay-inicio').classList.add('fade-out');
    setTimeout(() => { document.getElementById('overlay-inicio').style.display = 'none'; }, 800);
});

function destacarBotao(el) {
    document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('selecionado'));
    if(el) el.classList.add('selecionado');
}

function tocarSom(tipo) {
    let arquivo = tipo === 'dado' ? "dado.mp3" : (tipo === 'lp' ? "lp.mp3" : (tipo === 'click' ? "click.mp3" : "moeda.mp3"));
    new Audio(arquivo).play().catch(()=>{});
}

function toggleModoDados(el) {
    destacarBotao(el); modoDados = true;
    document.getElementById('controles-padrao').classList.add('hidden');
    document.getElementById('controles-dados').style.display = 'flex';
    document.getElementById('area').innerHTML = `<button class="btn-ROLAR-grande" onclick="jogar()">ROLAR</button>`;
}

function voltarLP() {
    modoDados = false;
    document.getElementById('controles-padrao').classList.remove('hidden');
    document.getElementById('controles-dados').style.display = 'none';
    destacarBotao(lpInicial[1] === 8000 ? document.getElementById('btn-8000') : document.getElementById('btn-4000'));
    renderizarLP();
}

function selecionarAcao(tipo, el) {
    acaoSelecionada = tipo;
    document.querySelectorAll('.btn-group-dice button').forEach(b => b.classList.remove('selecionado'));
    el.classList.add('selecionado');
    document.getElementById('area').innerHTML = `<button class="btn-ROLAR-grande" onclick="jogar()">ROLAR</button>`;
}

function jogar() {
    if (!acaoSelecionada) return;
    const area = document.getElementById("area");
    tocarSom('dado');
    if(acaoSelecionada === 'd20') {
        area.innerHTML = '<div class="resultado-d20-especial fundo-animado-d20 girar">?</div>';
        setTimeout(() => {
            const res = Math.floor(Math.random()*20)+1;
            area.innerHTML = `<div class="resultado-d20-especial fundo-animado-d20" ${res===20?'style="color:gold; font-size:80px; text-shadow:0 0 15px gold"':''}>${res}</div>`;
        }, 1200);
    } else if(acaoSelecionada.startsWith('d6')) {
        const qtd = parseInt(acaoSelecionada.split('-')[1]);
        area.innerHTML = '<div id="l" style="display:flex; gap:10px"></div>';
        for(let i=0;i<qtd;i++) document.getElementById('l').innerHTML += '<div class="dado girar">?</div>';
        setTimeout(() => {
            document.getElementById('l').innerHTML = '';
            for(let i=0;i<qtd;i++) document.getElementById('l').innerHTML += `<div class="dado">${Math.floor(Math.random()*6)+1}</div>`;
        }, 1200);
    } else {
        const lados = parseInt(acaoSelecionada.replace('d',''));
        area.innerHTML = '<div class="dado dado-d20 girar">?</div>';
        setTimeout(() => { area.innerHTML = `<div class="dado dado-d20">${Math.floor(Math.random()*lados)+1}</div>`; }, 1200);
    }
}

function prepararMoeda(el) {
    destacarBotao(el); modoDados = true;
    document.getElementById('area').innerHTML = `<div style="text-align:center; font-size:26px;">Decidir quem começa:</div><div style="text-align:center; margin-bottom:15px;">Jogador 1 🟥 &nbsp;&nbsp;&nbsp; Jogador 2 🟦</div><div class="moeda" onclick="girarMoeda(this)">GIRAR</div>`;
}

function girarMoeda(el) {
    tocarSom('moeda'); el.classList.add('girar'); el.innerHTML = "?";
    setTimeout(() => {
        el.classList.remove('girar');
        el.innerHTML = Math.random() < 0.5 ? "🟥 COMEÇA" : "🟦 COMEÇA";
        setTimeout(() => { el.onclick = () => prepararMoeda(null); }, 1200);
    }, 1200);
}

function iniciarLP(valor, el){ lp1=valor; lp2=valor; lpInicial={1:valor,2:valor}; destacarBotao(el); voltarLP(); }

function renderizarLP(){
    if(modoDados) return;
    document.getElementById("area").innerHTML = `<div class="lp-container">
        ${[1,2].map(j => `<div class="lp-player">
            <div>JOGADOR ${j}</div>
            <div id="display-lp${j}" class="lp-valor">${j===1?lp1:lp2}</div>
            <div id="teclado${j}" class="lp-teclado"></div>
            <div class="lp-controles">
                <button class="btn-menos" onclick="aplicarLP(${j}, -1)">- DIMINUIR</button>
                <button class="btn-mais" onclick="aplicarLP(${j}, 1)">+ AUMENTAR</button>
            </div>
        </div>`).join('')}
    </div>`;
    criarTeclados();
}

function criarTeclados(){
    for(let j=1;j<=2;j++){
        const t=document.getElementById('teclado'+j);
        for(let i=1;i<=9;i++){ const b=document.createElement('button'); b.textContent=i; b.onclick=()=>addNum(j,i); t.appendChild(b); }
        const b0=document.createElement('button'); b0.textContent='0'; b0.onclick=()=>addNum(j,0); t.appendChild(b0);
        const bc=document.createElement('button'); bc.textContent='Cancelar'; bc.onclick=()=>limpar(j); t.appendChild(bc);
        const br=document.createElement('button'); br.textContent='Resetar'; br.onclick=()=>reset(j); t.appendChild(br);
    }
}

function addNum(j,n){ if(inputLP[j].length<6){ inputLP[j]+=n; atualizarDisplay(j); } }
function atualizarDisplay(j){
    const d=document.getElementById('display-lp'+j);
    if(inputLP[j]!==''){ d.textContent=inputLP[j]; d.style.color='#ff4444'; }
    else { d.textContent=j===1?lp1:lp2; d.style.color='#2cd2a8'; }
}

function aplicarLP(j, t){
    let v=parseInt(inputLP[j]); if(isNaN(v) || v<=0) return;
    new Audio(t===1?'ganhar_lp.mp3':'perder_lp.mp3').play().catch(()=>{});
    if(j===1) lp1=Math.max(0,lp1+(v*t)); else lp2=Math.max(0,lp2+(v*t));
    inputLP[j]=''; atualizarDisplay(j);
}
function limpar(j){ inputLP[j]=''; atualizarDisplay(j); }
function reset(j){ if(j===1) lp1=lpInicial[1]; else lp2=lpInicial[2]; inputLP[j]=''; atualizarDisplay(j); }

document.getElementById('btn-fullscreen-toggle').addEventListener('click', async () => {
    if (!document.fullscreenElement) { await document.documentElement.requestFullscreen(); } 
    else { document.exitFullscreen(); }
});

window.onload = () => iniciarLP(8000, document.getElementById('btn-8000'));
document.querySelectorAll('.sidebar button').forEach(b => b.addEventListener('click', () => tocarSom('click')));
</script>
</body>
</html>
